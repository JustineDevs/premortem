name = "premortem"
main = "src/index.ts"
compatibility_date = "2026-06-08"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

[vars]
APP_ENV = "development"

[triggers]
crons = ["*/1 * * * *"]

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[queues.producers]]
binding = "AUDIT_QUEUE"
queue = "premortem-audit-jobs-dev"

[[queues.consumers]]
queue = "premortem-audit-jobs-dev"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "premortem-audit-jobs-dlq-dev"

[[routes]]
pattern = "api.premortem.jstn.site/*"
zone_name = "jstn.site"

[env.production]
name = "premortem"
workers_dev = false

[env.production.vars]
APP_ENV = "production"

[[env.production.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.production.queues.producers]]
binding = "AUDIT_QUEUE"
queue = "premortem-audit-jobs"

[[env.production.queues.consumers]]
queue = "premortem-audit-jobs"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "premortem-audit-jobs-dlq"

[[env.production.routes]]
pattern = "api.premortem.jstn.site/*"
zone_name = "jstn.site"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]
