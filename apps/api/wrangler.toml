name = "premortem-api"
main = "src/index.ts"
compatibility_date = "2026-06-08"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

[vars]
APP_ENV = "development"

[[queues.producers]]
binding = "AUDIT_QUEUE"
queue = "premortem-audit-jobs-dev"

[[queues.consumers]]
queue = "premortem-audit-jobs-dev"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "premortem-audit-jobs-dlq-dev"

[[routes]]
pattern = "api.premortem.dev/*"
zone_name = "premortem.dev"
