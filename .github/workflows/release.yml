name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: bash scripts/release/check-migrations.sh
      - run: bash scripts/release/build-manifest.sh
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/releases-notes-v0.1.0.md
          files: |
            docs/releases/releases-manifests/*.json
